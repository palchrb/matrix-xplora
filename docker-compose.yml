services:
  mautrix-xplora:
    build: .
    # Once published to GHCR, you can switch to:
    # image: ghcr.io/palchrb/matrix-xplora:latest
    container_name: mautrix-xplora
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - UID=1337
      - GID=1337
    # Only needed if your homeserver can't reach the container on the Docker network.
    # ports:
    #   - "29341:29341"
